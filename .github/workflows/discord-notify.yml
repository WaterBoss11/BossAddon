name: Discord Notifications
on:
  push:
    branches: [master]
  watch:
    types: [started]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # All embed building, sanitization, truncation, GitHub API calls (compare stats + star count)
      # and error handling live in scripts/discord-notify.mjs. The script never crashes the workflow:
      # a failed Discord call is logged and the job still exits 0. Node is preinstalled on the runner.
      - name: Notify Discord
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node scripts/discord-notify.mjs
