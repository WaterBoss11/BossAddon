# Mirror these versions with the AUTISM Client release you are building against.
[versions]
# mod-version is baked into the jar (fabric.mod.json) and the jar filename, and is what the in-game
# UpdateChecker compares against the latest GitHub release tag. It MUST track the release tag: every
# release bumps this and the git tag together (e.g. tag v1.9.1 <-> mod-version 1.9.1). The old "jar stays
# at 1.0.0 while tags advance" convention is dropped — it made the UpdateChecker report a permanent false
# "outdated" notice. 1.11.0 is a significant feature release: the command system moved under a single
# ?bossaddon root (old /bosspvp /bosschat /bossrelay /bossautotest removed), BossChat went public-facing
# with party + party-warp, and three defensive features landed (Velocity Crash Guard, AntiEntityPush
# Modify mode, reconfigure-loop guard).
mod-version = "1.11.0"

minecraft = "26.2"
fabric-loader = "0.19.3"
fabric-api = "0.152.2+26.2"
autism = "3.4"

loom = "1.17.11"

[libraries]
minecraft = { module = "com.mojang:minecraft", version.ref = "minecraft" }
fabric-loader = { module = "net.fabricmc:fabric-loader", version.ref = "fabric-loader" }
fabric-api = { module = "net.fabricmc.fabric-api:fabric-api", version.ref = "fabric-api" }
autism = { module = "com.autismclient:autism", version.ref = "autism" }

[plugins]
fabric-loom = { id = "net.fabricmc.fabric-loom", version.ref = "loom" }
